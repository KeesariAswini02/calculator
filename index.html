<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Calculator </title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="calculator" role="application" aria-label="Calculator">
    <div class="screen">
      <div class="top-row">
         <div class="title">Calculator</div>
      </div>

      <div class="display">
        <div class="sub-display" id="history">&nbsp;</div>
        <div class="main-display" id="display">0</div>
      </div>
    </div>

    <div class="keys" role="group" aria-label="Calculator keys">
      <button class="key clear" id="clear">C</button>
      <button class="key func" id="back">⌫</button>
      <button class="key func" id="percent">%</button>
      <button class="key op" data-op="/">÷</button>

      <button class="key" data-num="7">7</button>
      <button class="key" data-num="8">8</button>
      <button class="key" data-num="9">9</button>
      <button class="key op" data-op="*">×</button>

      <button class="key" data-num="4">4</button>
      <button class="key" data-num="5">5</button>
      <button class="key" data-num="6">6</button>
      <button class="key op" data-op="-">−</button>

      <button class="key" data-num="1">1</button>
      <button class="key" data-num="2">2</button>
      <button class="key" data-num="3">3</button>
      <button class="key op" data-op="+">+</button>

      <button class="key span-2" data-num="0">0</button>
      <button class="key" id="dot" data-num=".">.</button>
      <button class="key equal" id="equals">=</button>
    </div>

    <div class="footer">You can use keyboard: numbers, + - * /, Enter =, Backspace, Esc (clear)</div>
  </div>

  <script src="calci.js"></script>
</body>
</html>
